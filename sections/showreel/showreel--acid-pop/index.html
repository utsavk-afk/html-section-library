<!DOCTYPE html>
<!-- ===== SHOWREEL — ACID-POP ===== -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Showreel — Acid Pop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,600;0,700;0,900;1,900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{overflow-x:hidden;}

:root{
  --ink:#0A0A0A;
  --ink-2:#141414;
  --paper:#F4F4EF;
  --lime:#C7F13B;
  --magenta:#FF4D9D;
  --line:#2A2A2A;
  --muted:#8C8C86;
  --font:"Archivo",system-ui,-apple-system,sans-serif;
}

.reel{
  background:var(--ink);
  color:var(--paper);
  font-family:var(--font);
  width:100%;
  padding:76px clamp(20px,5vw,80px) 84px;
  position:relative;
  overflow:hidden;
}
.reel__inner{
  max-width:1440px;
  margin:0 auto;
  position:relative;
}

/* ticker strip */
.reel__ticker{
  display:flex;
  align-items:center;
  gap:14px;
  font-weight:700;
  font-size:12px;
  letter-spacing:.28em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:38px;
}
.reel__ticker .dot{
  width:9px;height:9px;border-radius:50%;
  background:var(--magenta);
  flex:none;
  box-shadow:0 0 0 4px rgba(255,77,157,.15);
}
.reel__ticker span:last-child{color:var(--lime);}

/* main asymmetric grid */
.reel__grid{
  display:grid;
  grid-template-columns:1.55fr .95fr;
  gap:clamp(28px,3.5vw,56px);
  align-items:end;
}

/* ---- the video visual (focal point) ---- */
.stage{
  position:relative;
  border-radius:22px;
  overflow:hidden;
  aspect-ratio:16/9;
  background:
    linear-gradient(115deg,#171717 0%,#0e0e0e 60%,#050505 100%);
  border:1px solid var(--line);
  box-shadow:0 40px 80px -40px rgba(0,0,0,.9);
}
/* diagonal color wedges — bold flat, no glow */
.stage::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(135deg,var(--magenta) 0 30%,transparent 30%) top left/46% 46% no-repeat,
    linear-gradient(315deg,var(--lime) 0 30%,transparent 30%) bottom right/54% 60% no-repeat;
  opacity:.92;
  mix-blend-mode:normal;
}
/* scanline / film grid lines */
.stage::after{
  content:"";
  position:absolute;inset:0;
  background:
    repeating-linear-gradient(0deg,rgba(255,255,255,.05) 0 1px,transparent 1px 46px);
  pointer-events:none;
}
.stage__badge{
  position:absolute;
  top:18px;left:18px;
  z-index:3;
  display:flex;align-items:center;gap:8px;
  background:var(--ink);
  color:var(--paper);
  font-weight:700;font-size:11px;letter-spacing:.2em;text-transform:uppercase;
  padding:8px 14px;border-radius:999px;
  border:1px solid var(--line);
}
.stage__badge b{color:var(--magenta);}
.stage__rec{
  width:8px;height:8px;border-radius:50%;background:var(--magenta);
  animation:blink 1.4s steps(1) infinite;
}
@keyframes blink{50%{opacity:.15;}}

.stage__tc{
  position:absolute;
  right:18px;bottom:16px;z-index:3;
  font-weight:700;font-size:13px;letter-spacing:.14em;
  color:var(--ink);
  background:var(--lime);
  padding:5px 10px;border-radius:6px;
}
.stage__label{
  position:absolute;
  left:20px;bottom:18px;z-index:3;
  max-width:52%;
  font-weight:900;font-size:clamp(18px,2.2vw,30px);
  line-height:.98;letter-spacing:-.02em;
  color:var(--ink);
  text-transform:uppercase;
}

/* play button — prominent, chunky */
.play{
  position:absolute;
  z-index:4;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:clamp(96px,12vw,148px);
  height:clamp(96px,12vw,148px);
  border-radius:50%;
  background:var(--lime);
  border:4px solid var(--ink);
  display:grid;place-items:center;
  cursor:pointer;
  box-shadow:0 0 0 10px rgba(199,241,59,.14);
  transition:transform .16s ease, box-shadow .16s ease;
}
.play:hover{
  transform:translate(-50%,-50%) scale(1.06);
  box-shadow:0 0 0 16px rgba(199,241,59,.12);
}
.play__tri{
  width:0;height:0;
  margin-left:8px;
  border-style:solid;
  border-width:20px 0 20px 34px;
  border-color:transparent transparent transparent var(--ink);
}

/* rotating caption around play (pure text ring, no lib) */
.play__ring{
  position:absolute;
  z-index:4;
  top:50%;left:50%;
  width:clamp(180px,22vw,260px);
  height:clamp(180px,22vw,260px);
  transform:translate(-50%,-50%);
  animation:spin 14s linear infinite;
  pointer-events:none;
}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg);}}
.play__ring text{
  font-weight:700;font-size:13px;letter-spacing:.34em;
  fill:var(--paper);
  text-transform:uppercase;
}

/* ---- right column copy ---- */
.copy{padding-bottom:6px;}
.copy__kicker{
  display:inline-block;
  font-weight:700;font-size:12px;letter-spacing:.24em;text-transform:uppercase;
  color:var(--ink);
  background:var(--lime);
  padding:7px 14px;border-radius:999px;
  margin-bottom:20px;
}
.copy__title{
  font-weight:900;
  font-size:clamp(48px,7.4vw,116px);
  line-height:.86;
  letter-spacing:-.04em;
  text-transform:uppercase;
}
.copy__title em{
  font-style:italic;
  color:var(--magenta);
}
.copy__title u{
  text-decoration:none;
  -webkit-text-stroke:2px var(--lime);
  color:transparent;
}
.copy__line{
  margin-top:22px;
  max-width:34ch;
  font-size:clamp(15px,1.15vw,18px);
  line-height:1.5;
  font-weight:400;
  color:#C9C9C2;
}
.copy__cta{
  margin-top:30px;
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
}
.btn{
  border:none;cursor:pointer;
  font-family:var(--font);
  font-weight:700;font-size:14px;letter-spacing:.04em;
  padding:16px 28px;border-radius:999px;
  text-transform:uppercase;
  transition:transform .14s ease;
}
.btn:hover{transform:translateY(-2px);}
.btn--primary{background:var(--magenta);color:#fff;}
.btn--ghost{
  background:transparent;color:var(--paper);
  border:1.5px solid var(--line);
}
.copy__meta{
  margin-top:34px;
  display:flex;gap:26px;flex-wrap:wrap;
  border-top:1px solid var(--line);
  padding-top:20px;
}
.copy__meta div span{
  display:block;
  font-weight:900;font-size:26px;line-height:1;
  color:var(--lime);
}
.copy__meta div small{
  display:block;margin-top:6px;
  font-size:11px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--muted);
}

@media(max-width:640px){
  .reel{padding:52px 20px 60px;}
  .reel__grid{grid-template-columns:1fr;gap:30px;align-items:stretch;}
  .copy{order:-1;}
  .copy__title{font-size:clamp(52px,17vw,84px);}
  .copy__line{max-width:100%;}
  .stage__label{max-width:70%;}
  .reel__ticker{flex-wrap:wrap;gap:10px;margin-bottom:26px;}
}
</style>
</head>
<body>

<section class="reel">
  <div class="reel__inner">

    <div class="reel__ticker">
      <span class="dot"></span>
      <span>2025 Directors Cut</span>
      <span>—</span>
      <span>32 Films · 04 Continents</span>
      <span>—</span>
      <span>Now Streaming</span>
    </div>

    <div class="reel__grid">

      <!-- FOCAL: the video stage -->
      <figure class="stage" aria-label="Showreel preview">
        <div class="stage__badge"><span class="stage__rec"></span> <b>REEL</b> · LIVE CUT</div>

        <button class="play" aria-label="Play the 2025 showreel">
          <span class="play__tri"></span>
        </button>

        <svg class="play__ring" viewBox="0 0 100 100" aria-hidden="true">
          <defs>
            <path id="ring" d="M 50 50 m -40 0 a 40 40 0 1 1 80 0 a 40 40 0 1 1 -80 0"/>
          </defs>
          <text><textPath href="#ring" startOffset="0">PRESS PLAY · FULL VOLUME · PRESS PLAY · FULL VOLUME · </textPath></text>
        </svg>

        <figcaption class="stage__label">Loud<br>Frames</figcaption>
        <div class="stage__tc">02:47:19:04</div>
      </figure>

      <!-- copy -->
      <div class="copy">
        <span class="copy__kicker">The Showreel / 02:47 min</span>
        <h2 class="copy__title">Play it <em>loud</em>,<br><u>cut</u> it sharp</h2>
        <p class="copy__line">A year of grade, grit and neon — stitched into one relentless cut. No dead frames, no filler, just the work that got the callbacks.</p>

        <div class="copy__cta">
          <button class="btn btn--primary">Watch the reel</button>
          <button class="btn btn--ghost">Full case list</button>
        </div>

        <div class="copy__meta">
          <div><span>2.7M</span><small>Views logged</small></div>
          <div><span>32</span><small>Shots inside</small></div>
          <div><span>4K60</span><small>Master grade</small></div>
        </div>
      </div>

    </div>
  </div>
</section>

</body>
</html>
