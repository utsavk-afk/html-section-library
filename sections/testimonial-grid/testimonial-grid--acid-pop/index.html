<!DOCTYPE html>
<!-- ===== TESTIMONIAL-GRID — ACID-POP ===== -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testimonial Grid — Acid Pop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#0A0A0A;
  --ink:#F4F4EF;
  --muted:#8A8A82;
  --line:#242424;
  --accent:#C7F13B;      /* lime primary */
  --accent-2:#FF4D9D;    /* magenta secondary */
  --serif:'Archivo',system-ui,sans-serif;
  --sans:'Archivo',system-ui,sans-serif;
}

body{background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;}

.tg{
  position:relative;
  width:100%;
  padding:88px 48px 96px;
  overflow:hidden;
}

/* big off-canvas typographic accent */
.tg__ghost{
  position:absolute;
  top:-40px;right:-30px;
  font-weight:900;
  font-size:clamp(140px,26vw,360px);
  letter-spacing:-.06em;
  line-height:.8;
  color:transparent;
  -webkit-text-stroke:2px var(--line);
  pointer-events:none;
  user-select:none;
  z-index:0;
}

.tg__inner{position:relative;z-index:1;max-width:1440px;margin:0 auto;}

/* header row — asymmetric, left weighted */
.tg__head{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:32px;
  margin-bottom:48px;
  flex-wrap:wrap;
}
.tg__eyebrow{
  display:inline-flex;
  align-items:center;
  gap:9px;
  font-size:12px;
  font-weight:800;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--bg);
  background:var(--accent);
  padding:7px 14px;
  border-radius:100px;
  margin-bottom:22px;
}
.tg__eyebrow span{width:7px;height:7px;background:var(--accent-2);border-radius:50%;}
.tg__title{
  font-weight:900;
  font-size:clamp(46px,6.6vw,104px);
  line-height:.9;
  letter-spacing:-.045em;
  max-width:13ch;
}
.tg__title em{font-style:normal;color:var(--accent);}
.tg__aside{
  max-width:300px;
  padding-bottom:10px;
}
.tg__aside p{color:var(--muted);font-size:15px;line-height:1.55;font-weight:600;margin-bottom:16px;}
.tg__rating{display:flex;align-items:baseline;gap:10px;}
.tg__rating b{font-size:34px;font-weight:900;letter-spacing:-.03em;}
.tg__rating small{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}

/* MASONRY grid via columns for varied heights */
.tg__grid{
  column-count:3;
  column-gap:22px;
}

.card{
  break-inside:avoid;
  display:block;
  margin-bottom:22px;
  border-radius:18px;
  padding:26px 26px 24px;
  border:1.5px solid var(--line);
  background:#121210;
}
.card__quote{
  font-weight:700;
  font-size:19px;
  line-height:1.32;
  letter-spacing:-.015em;
  margin-bottom:22px;
}
.card__quote i{font-style:normal;background:var(--accent);color:var(--bg);padding:0 4px;border-radius:3px;}

.card__by{display:flex;align-items:center;gap:13px;}
.avatar{
  width:44px;height:44px;flex:0 0 44px;
  border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:16px;letter-spacing:-.02em;
  color:var(--bg);
}
.card__name{font-weight:800;font-size:15px;line-height:1.15;}
.card__role{font-weight:600;font-size:12.5px;color:var(--muted);margin-top:2px;}

/* FEATURE card — lime slab, oversized */
.card--feature{
  background:var(--accent);
  border-color:var(--accent);
  color:var(--bg);
  padding:34px 32px 30px;
  border-radius:22px;
}
.card--feature .card__mark{
  font-family:var(--serif);
  font-weight:900;
  font-size:82px;
  line-height:.6;
  letter-spacing:-.05em;
  display:block;
  margin-bottom:6px;
}
.card--feature .card__quote{
  font-weight:800;
  font-size:clamp(24px,2.5vw,32px);
  line-height:1.14;
  letter-spacing:-.03em;
  margin-bottom:26px;
}
.card--feature .card__name{color:var(--bg);}
.card--feature .card__role{color:#4a5410;}
.card--feature .avatar{color:var(--accent);background:var(--bg)!important;}

/* magenta accent card */
.card--pink{border-color:var(--accent-2);}
.card--pink .card__quote i{background:var(--accent-2);color:var(--ink);}

/* second-focus outline card */
.card--outline{background:transparent;border-color:#333;}

/* avatar color variants */
.av-lime{background:var(--accent);}
.av-pink{background:var(--accent-2);color:var(--ink);}
.av-ink{background:var(--ink);color:var(--bg);}

@media(max-width:960px){
  .tg__grid{column-count:2;}
}
@media(max-width:640px){
  .tg{padding:56px 20px 64px;}
  .tg__ghost{font-size:170px;top:-14px;right:-8px;}
  .tg__head{margin-bottom:34px;}
  .tg__aside{max-width:100%;padding-bottom:0;}
  .tg__grid{column-count:1;}
  .card{padding:22px 20px;}
  .card--feature{padding:28px 24px;}
  .card--feature .card__quote{font-size:24px;}
}
</style>
</head>
<body>
<section class="tg">
  <div class="tg__ghost" aria-hidden="true">★★★★★</div>
  <div class="tg__inner">

    <div class="tg__head">
      <div>
        <span class="tg__eyebrow"><span></span>Dropped into Claude Code</span>
        <h2 class="tg__title">Builders ship <em>faster</em> with these sections.</h2>
      </div>
      <div class="tg__aside">
        <p>Copy-paste blocks pulled from the free library — no build step, no npm install, no design debt to pay down later.</p>
        <div class="tg__rating"><b>4.9/5</b><small>2,140 devs</small></div>
      </div>
    </div>

    <div class="tg__grid">

      <!-- feature (lime slab) -->
      <figure class="card card--feature">
        <span class="card__mark">”</span>
        <blockquote class="card__quote">I paste one section, tweak two tokens, and it just matches the rest of my page. Cut my landing-page build from a full day to about forty minutes.</blockquote>
        <figcaption class="card__by">
          <div class="avatar av-ink">RM</div>
          <div>
            <div class="card__name">Rosa Medina</div>
            <div class="card__role">Solo founder, Tallwick</div>
          </div>
        </figcaption>
      </figure>

      <figure class="card">
        <blockquote class="card__quote">The <i>tokens</i> block at the top is the whole trick — swap five variables and the acid-pop skin becomes my brand instantly.</blockquote>
        <figcaption class="card__by">
          <div class="avatar av-lime">DK</div>
          <div>
            <div class="card__name">Devon Kaur</div>
            <div class="card__role">Frontend lead, Nortide</div>
          </div>
        </figcaption>
      </figure>

      <figure class="card card--pink">
        <blockquote class="card__quote">No glassmorphism, no stock smiles, no purple gradient. Finally a set of sections that don't <i>scream</i> "an AI made this."</blockquote>
        <figcaption class="card__by">
          <div class="avatar av-pink">JT</div>
          <div>
            <div class="card__name">Jae Thornbury</div>
            <div class="card__role">Design engineer, Loomfield</div>
          </div>
        </figcaption>
      </figure>

      <figure class="card card--outline">
        <blockquote class="card__quote">Handed the folder to a junior. She shipped a pricing page the same afternoon and it looked intentional.</blockquote>
        <figcaption class="card__by">
          <div class="avatar av-ink">OB</div>
          <div>
            <div class="card__name">Omar Bellini</div>
            <div class="card__role">CTO, Grackle Labs</div>
          </div>
        </figcaption>
      </figure>

      <figure class="card">
        <blockquote class="card__quote">Every section is one self-contained file. I git-diff it, I read it in ten seconds, I know exactly what it does.</blockquote>
        <figcaption class="card__by">
          <div class="avatar av-lime">HW</div>
          <div>
            <div class="card__name">Hana Weiss</div>
            <div class="card__role">Indie hacker, shipped 6 apps</div>
          </div>
        </figcaption>
      </figure>

      <figure class="card">
        <blockquote class="card__quote">Responsive out of the box. The mobile breakpoint actually reflows instead of just shrinking — rare in copy-paste kits.</blockquote>
        <figcaption class="card__by">
          <div class="avatar av-pink">CN</div>
          <div>
            <div class="card__name">Cyrus Ngata</div>
            <div class="card__role">Freelance dev, Cape Town</div>
          </div>
        </figcaption>
      </figure>

    </div>
  </div>
</section>
</body>
</html>
