<!DOCTYPE html>
<!-- ===== AVATAR-STACK — BRUTALIST ===== -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avatar Stack — Brutalist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#FAFAF7;
  --ink:#111111;
  --muted:#5A5A54;
  --line:#111111;
  --accent:#FFE500;
  --red:#FF3B21;
  --serif:'Archivo','Arial Black',sans-serif;
  --sans:'Space Mono',ui-monospace,monospace;
}

/* ---- section shell ---- */
.proof{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--sans);
  min-height:640px;
  display:flex;
  align-items:center;
  padding:80px 6vw;
  position:relative;
  overflow:hidden;
  /* faint visible grid */
  background-image:
    linear-gradient(to right,rgba(17,17,17,.05) 1px,transparent 1px),
    linear-gradient(to bottom,rgba(17,17,17,.05) 1px,transparent 1px);
  background-size:56px 56px;
}

.proof__inner{
  width:100%;
  max-width:1180px;
  margin:0 auto;
  display:grid;
  grid-template-columns:1.15fr .85fr;
  gap:64px;
  align-items:center;
  position:relative;
  z-index:2;
}

/* ---- left column / focal point ---- */
.tag{
  display:inline-block;
  font-family:var(--sans);
  font-weight:700;
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
  background:var(--ink);
  color:var(--accent);
  padding:6px 12px;
  margin-bottom:26px;
}

.headline{
  font-family:var(--serif);
  font-weight:900;
  text-transform:uppercase;
  font-size:clamp(34px,5vw,62px);
  line-height:.94;
  letter-spacing:-1px;
  margin-bottom:22px;
}
.headline .mark{
  background:var(--accent);
  padding:0 6px;
  box-decoration-break:clone;
  -webkit-box-decoration-break:clone;
}

/* ---- avatar cluster ---- */
.stack{
  display:flex;
  align-items:center;
  margin-bottom:26px;
}
.stack__row{display:flex;}
.avatar{
  width:64px;
  height:64px;
  border:3px solid var(--line);
  background:var(--bg);
  color:var(--ink);
  font-family:var(--serif);
  font-weight:900;
  font-size:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-left:-18px;
  box-shadow:5px 5px 0 var(--ink);
  transition:transform .12s ease;
  cursor:default;
}
.avatar:first-child{margin-left:0;}
.avatar:hover{transform:translate(-2px,-2px);z-index:5;}
.avatar--a{background:var(--accent);}
.avatar--b{background:var(--ink);color:var(--bg);}
.avatar--c{background:var(--red);color:#fff;}
.avatar--d{background:var(--bg);}
.avatar--e{background:var(--accent);}
.avatar--more{
  background:var(--ink);
  color:var(--accent);
  font-family:var(--sans);
  font-weight:700;
  font-size:15px;
  margin-left:-18px;
}

/* ---- join line + rating ---- */
.join{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:10px 18px;
}
.join__count{
  font-family:var(--serif);
  font-weight:900;
  font-size:28px;
  background:var(--ink);
  color:var(--accent);
  padding:2px 10px;
}
.join__text{
  font-family:var(--sans);
  font-weight:700;
  font-size:14px;
  text-transform:uppercase;
  letter-spacing:.5px;
  line-height:1.3;
  max-width:280px;
}

.rating{
  margin-top:22px;
  display:inline-flex;
  align-items:center;
  gap:12px;
  border:3px solid var(--line);
  background:var(--bg);
  box-shadow:6px 6px 0 var(--ink);
  padding:10px 16px;
}
.stars{display:inline-flex;gap:3px;}
.stars svg{width:22px;height:22px;display:block;}
.rating__num{
  font-family:var(--serif);
  font-weight:900;
  font-size:20px;
}
.rating__src{
  font-family:var(--sans);
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:1px;
  color:var(--muted);
  border-left:2px solid var(--line);
  padding-left:12px;
}

/* ---- right column / stamp block ---- */
.stamp{
  border:4px solid var(--line);
  background:var(--accent);
  box-shadow:10px 10px 0 var(--ink);
  padding:34px 30px;
  transform:rotate(-1.4deg);
  position:relative;
}
.stamp__kicker{
  font-family:var(--sans);
  font-weight:700;
  font-size:11px;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:14px;
}
.stamp__big{
  font-family:var(--serif);
  font-weight:900;
  font-size:clamp(48px,7vw,80px);
  line-height:.9;
  letter-spacing:-2px;
}
.stamp__sub{
  font-family:var(--sans);
  font-weight:700;
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:.5px;
  margin-top:8px;
  border-top:3px solid var(--line);
  padding-top:12px;
}
.stamp__badge{
  position:absolute;
  top:-16px;
  right:-14px;
  background:var(--red);
  color:#fff;
  font-family:var(--sans);
  font-weight:700;
  font-size:11px;
  letter-spacing:1px;
  text-transform:uppercase;
  padding:8px 12px;
  border:3px solid var(--line);
  transform:rotate(6deg);
}

/* decorative corner block, breaks symmetry */
.proof__corner{
  position:absolute;
  left:-40px;
  bottom:-40px;
  width:180px;
  height:180px;
  background:repeating-linear-gradient(45deg,var(--ink) 0 8px,transparent 8px 16px);
  opacity:.08;
  z-index:1;
}

/* ---- responsive ---- */
@media(max-width:640px){
  .proof{padding:52px 22px;min-height:0;}
  .proof__inner{grid-template-columns:1fr;gap:40px;}
  .avatar{width:52px;height:52px;font-size:18px;margin-left:-14px;box-shadow:4px 4px 0 var(--ink);}
  .avatar--more{margin-left:-14px;font-size:13px;}
  .stamp{transform:rotate(-1deg);box-shadow:7px 7px 0 var(--ink);}
  .stamp__badge{right:-6px;}
  .join__count{font-size:24px;}
  .rating{flex-wrap:wrap;}
}
</style>
</head>
<body>
<section class="proof" aria-label="Social proof">
  <span class="proof__corner" aria-hidden="true"></span>
  <div class="proof__inner">

    <!-- FOCAL COLUMN -->
    <div class="proof__main">
      <span class="tag">Shipped in prod</span>
      <h2 class="headline">Dropped into<br><span class="mark">2,400 codebases</span><br>last quarter.</h2>

      <div class="stack" aria-label="Teams using this library">
        <div class="stack__row">
          <span class="avatar avatar--a" title="Priya Raman">PR</span>
          <span class="avatar avatar--b" title="Devon Okoye">DO</span>
          <span class="avatar avatar--c" title="Mara Lindqvist">ML</span>
          <span class="avatar avatar--d" title="Jonah Weiss">JW</span>
          <span class="avatar avatar--e" title="Sana Kapoor">SK</span>
          <span class="avatar avatar--more" title="and many more">+2.4K</span>
        </div>
      </div>

      <div class="join">
        <span class="join__count">2,431</span>
        <span class="join__text">engineering teams paste these sections straight into Claude Code — no license, no signup.</span>
      </div>

      <div class="rating" role="img" aria-label="Rated 4.9 out of 5 from 610 reviews">
        <span class="stars" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="#111"><path d="M12 2l2.9 6.3 6.9.7-5.1 4.7 1.4 6.8L12 17.8 5.9 20.5l1.4-6.8L2.2 9l6.9-.7z"/></svg>
          <svg viewBox="0 0 24 24" fill="#111"><path d="M12 2l2.9 6.3 6.9.7-5.1 4.7 1.4 6.8L12 17.8 5.9 20.5l1.4-6.8L2.2 9l6.9-.7z"/></svg>
          <svg viewBox="0 0 24 24" fill="#111"><path d="M12 2l2.9 6.3 6.9.7-5.1 4.7 1.4 6.8L12 17.8 5.9 20.5l1.4-6.8L2.2 9l6.9-.7z"/></svg>
          <svg viewBox="0 0 24 24" fill="#111"><path d="M12 2l2.9 6.3 6.9.7-5.1 4.7 1.4 6.8L12 17.8 5.9 20.5l1.4-6.8L2.2 9l6.9-.7z"/></svg>
          <svg viewBox="0 0 24 24" fill="#FFE500" stroke="#111" stroke-width="1.4"><path d="M12 2l2.9 6.3 6.9.7-5.1 4.7 1.4 6.8L12 17.8 5.9 20.5l1.4-6.8L2.2 9l6.9-.7z"/></svg>
        </span>
        <span class="rating__num">4.9 / 5</span>
        <span class="rating__src">610 dev reviews</span>
      </div>
    </div>

    <!-- STAMP COLUMN -->
    <aside class="stamp" aria-label="Copy statistic">
      <span class="stamp__badge">Free forever</span>
      <p class="stamp__kicker">Copy / paste count</p>
      <div class="stamp__big">18K+</div>
      <p class="stamp__sub">sections lifted this month</p>
    </aside>

  </div>
</section>
</body>
</html>
