<!DOCTYPE html>
<!-- ===== PRESS-LOGOS — EDITORIAL ===== -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>As Featured In — Press Logos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{overflow-x:hidden;}

:root{
  --light:#FCFCFA;
  --ink:#1B1A17;
  --accent:#B4472B;
  --muted:#6E6A61;
  --hair:#DDD9CF;
  --serif:"Fraunces",Georgia,serif;
  --sans:"Inter",system-ui,sans-serif;
}

body{
  background:var(--light);
  color:var(--ink);
  font-family:var(--sans);
  -webkit-font-smoothing:antialiased;
}

.press{
  max-width:1440px;
  margin:0 auto;
  padding:120px 96px 128px;
  position:relative;
}

/* asymmetric top: label sits left, no centering */
.press__head{
  display:grid;
  grid-template-columns:minmax(0,1fr) minmax(0,1.35fr);
  gap:56px;
  align-items:end;
  padding-bottom:56px;
  border-bottom:1px solid var(--hair);
}

.press__label{
  font-size:12px;
  font-weight:600;
  letter-spacing:.26em;
  text-transform:uppercase;
  color:var(--accent);
  display:flex;
  align-items:center;
  gap:14px;
}
.press__label::before{
  content:"";
  width:34px;
  height:1px;
  background:var(--accent);
  display:inline-block;
}

.press__lead{
  font-family:var(--serif);
  font-weight:400;
  font-size:clamp(26px,3vw,40px);
  line-height:1.18;
  letter-spacing:-.01em;
  max-width:16ch;
  justify-self:end;
  text-align:right;
}
.press__lead em{
  font-style:italic;
  color:var(--accent);
}

/* logo row — uneven, not a uniform grid */
.press__row{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:0;
  margin-top:6px;
}
.press__item{
  flex:1 1 auto;
  min-width:160px;
  padding:44px 40px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-right:1px solid var(--hair);
  color:var(--ink);
  opacity:.72;
  transition:opacity .3s ease,color .3s ease;
}
.press__item:last-child{border-right:none;}
.press__item:hover{opacity:1;color:var(--accent);}
.press__item svg{display:block;width:100%;height:auto;max-height:34px;}
.press__item svg *{fill:currentColor;}

/* footnote */
.press__foot{
  margin-top:44px;
  display:flex;
  align-items:baseline;
  gap:12px;
  font-size:13px;
  color:var(--muted);
}
.press__foot .num{
  font-family:var(--serif);
  font-style:italic;
  font-size:18px;
  color:var(--ink);
}
.press__quote{
  font-family:var(--serif);
  font-style:italic;
  font-size:15px;
  color:var(--ink);
}

@media(max-width:640px){
  .press{padding:64px 24px 72px;}
  .press__head{
    grid-template-columns:1fr;
    gap:24px;
    align-items:start;
    padding-bottom:36px;
  }
  .press__lead{
    justify-self:start;
    text-align:left;
    font-size:24px;
    max-width:22ch;
  }
  .press__row{margin-top:0;}
  .press__item{
    flex:1 1 44%;
    min-width:0;
    padding:30px 18px;
    border-bottom:1px solid var(--hair);
  }
  .press__item:nth-child(2n){border-right:none;}
  .press__item svg{max-height:26px;}
  .press__foot{margin-top:32px;flex-direction:column;gap:6px;}
}
</style>
</head>
<body>

<section class="press" aria-label="Press coverage">
  <div class="press__head">
    <span class="press__label">As Featured In</span>
    <p class="press__lead">Our field notebook keeps ending up in <em>other people's</em> reading lists.</p>
  </div>

  <div class="press__row">
    <!-- The Atlas Review -->
    <div class="press__item" aria-label="The Atlas Review">
      <svg viewBox="0 0 190 30" role="img" aria-hidden="true">
        <text x="0" y="14" font-family="Georgia, 'Fraunces', serif" font-size="17" font-style="italic" font-weight="400">The Atlas</text>
        <text x="0" y="28" font-family="Inter, sans-serif" font-size="9" letter-spacing="4" font-weight="600">REVIEW</text>
      </svg>
    </div>

    <!-- Meridian Quarterly -->
    <div class="press__item" aria-label="Meridian Quarterly">
      <svg viewBox="0 0 180 30" role="img" aria-hidden="true">
        <text x="0" y="21" font-family="Georgia, 'Fraunces', serif" font-size="21" font-weight="500" letter-spacing="1">MERIDIAN</text>
        <rect x="150" y="6" width="1" height="16"/>
        <text x="158" y="12" font-family="Inter, sans-serif" font-size="7" letter-spacing="1.5" font-weight="600">QTLY</text>
      </svg>
    </div>

    <!-- Kindling (all-lowercase wordmark) -->
    <div class="press__item" aria-label="Kindling">
      <svg viewBox="0 0 150 30" role="img" aria-hidden="true">
        <text x="0" y="22" font-family="Inter, sans-serif" font-size="23" font-weight="600" letter-spacing="-1">kindling</text>
        <circle cx="140" cy="8" r="3"/>
      </svg>
    </div>

    <!-- The Longform Dispatch -->
    <div class="press__item" aria-label="The Longform Dispatch">
      <svg viewBox="0 0 200 30" role="img" aria-hidden="true">
        <text x="0" y="20" font-family="Georgia, 'Fraunces', serif" font-size="19" font-style="italic" font-weight="400">Longform</text>
        <text x="105" y="20" font-family="Inter, sans-serif" font-size="12" letter-spacing="2.5" font-weight="600">DISPATCH</text>
      </svg>
    </div>

    <!-- CURRENT / weekly signal -->
    <div class="press__item" aria-label="Current">
      <svg viewBox="0 0 160 30" role="img" aria-hidden="true">
        <text x="0" y="21" font-family="Inter, sans-serif" font-size="20" letter-spacing="6" font-weight="500">CURRENT</text>
      </svg>
    </div>
  </div>

  <div class="press__foot">
    <span class="num">4.2M</span>
    <span>combined readership</span>
    <span class="press__quote">&mdash; &ldquo;the most useful thing in our inbox this quarter.&rdquo;</span>
  </div>
</section>

</body>
</html>
