<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>As Featured In — Press Logos (Dark/Luxe)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ===== PRESS-LOGOS — DARK/LUXE ===== */
*{box-sizing:border-box;margin:0;padding:0;}
html,body{overflow-x:hidden;}

:root{
  --bg:#121216;
  --panel:#17171c;
  --ink:#F4F4F5;
  --muted:#A1A1AA;
  --faint:#71717A;
  --amber:#F59E42;
  --border:rgba(244,244,245,0.10);
  --border-strong:rgba(244,244,245,0.16);
  --sans:'Inter',system-ui,-apple-system,sans-serif;
  --serif:'Fraunces',Georgia,serif;
}

body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--sans);
  -webkit-font-smoothing:antialiased;
}

.press{
  max-width:1440px;
  margin:0 auto;
  padding:112px 64px;
  position:relative;
}

/* thin top hairline that stops short of the right edge — asymmetric */
.press::before{
  content:"";
  position:absolute;
  top:0;left:64px;
  width:min(560px,60%);
  height:1px;
  background:linear-gradient(90deg,var(--border-strong),transparent);
}

.press__grid{
  display:grid;
  grid-template-columns:minmax(240px,340px) 1fr;
  gap:56px 72px;
  align-items:center;
}

/* --- left: the label block, the focal point --- */
.press__lead{
  max-width:320px;
}
.press__eyebrow{
  display:inline-flex;
  align-items:center;
  gap:9px;
  font-size:11px;
  font-weight:600;
  letter-spacing:0.22em;
  text-transform:uppercase;
  color:var(--amber);
  margin-bottom:20px;
}
.press__eyebrow .dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--amber);
  box-shadow:0 0 0 4px rgba(245,158,66,0.14);
}
.press__title{
  font-family:var(--serif);
  font-weight:400;
  font-size:29px;
  line-height:1.22;
  letter-spacing:-0.01em;
  color:var(--ink);
}
.press__title em{
  font-style:italic;
  color:var(--amber);
}
.press__note{
  margin-top:16px;
  font-size:13.5px;
  line-height:1.6;
  color:var(--muted);
  max-width:280px;
}

/* --- right: logo wall, uneven rhythm not a uniform grid --- */
.press__wall{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:0;
  border-top:1px solid var(--border);
  border-left:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
}
.logo{
  flex:1 1 220px;
  min-width:180px;
  height:96px;
  display:flex;
  align-items:center;
  padding:0 26px;
  border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);
  color:var(--muted);
  transition:color .25s ease, background .25s ease;
}
.logo:hover{ color:var(--ink); background:rgba(244,244,245,0.02); }
.logo svg{ display:block; width:auto; height:22px; }
.logo svg *{ fill:currentColor; }

/* give a couple of tiles distinct weight — vary, don't uniform */
.logo--wide{ flex-basis:280px; }
.logo--tall{ height:112px; }

.press__meta{
  grid-column:2;
  display:flex;
  align-items:baseline;
  gap:14px;
  margin-top:22px;
  font-size:12.5px;
  color:var(--faint);
}
.press__meta strong{
  color:var(--ink);
  font-weight:600;
  font-variant-numeric:tabular-nums;
}
.press__meta .bar{ flex:1; height:1px; background:var(--border); }

@media (max-width:640px){
  .press{ padding:64px 24px; }
  .press::before{ left:24px; width:70%; }
  .press__grid{ grid-template-columns:1fr; gap:32px; }
  .press__title{ font-size:24px; }
  .logo{ flex:1 1 50%; min-width:0; height:80px; padding:0 18px; }
  .logo svg{ height:18px; }
  .logo--wide{ flex-basis:50%; }
  .logo--tall{ height:80px; }
  .press__meta{ grid-column:1; flex-wrap:wrap; }
  .press__meta .bar{ display:none; }
}
</style>
</head>
<body>
<section class="press" aria-label="Press coverage">
  <div class="press__grid">

    <div class="press__lead">
      <span class="press__eyebrow"><span class="dot"></span>In the press</span>
      <h2 class="press__title">The work speaks, but it helps when <em>the desks that matter</em> repeat it.</h2>
      <p class="press__note">Coverage from the newsrooms and trade titles our clients actually read before a purchase.</p>
    </div>

    <div class="press__wall" role="list">

      <div class="logo logo--wide logo--tall" role="listitem" aria-label="The Ledger Quarterly">
        <svg viewBox="0 0 220 24" role="img" aria-hidden="true">
          <text x="0" y="18" font-family="Fraunces, Georgia, serif" font-size="21" font-weight="500" letter-spacing="0.5" fill="currentColor">The Ledger</text>
        </svg>
      </div>

      <div class="logo" role="listitem" aria-label="Northbeam">
        <svg viewBox="0 0 160 24" role="img" aria-hidden="true">
          <rect x="0" y="4" width="16" height="16" rx="3" fill="none" stroke="currentColor" stroke-width="2"/>
          <text x="26" y="18" font-family="Inter, sans-serif" font-size="18" font-weight="600" letter-spacing="-0.5" fill="currentColor">Northbeam</text>
        </svg>
      </div>

      <div class="logo" role="listitem" aria-label="Cadence Wire">
        <svg viewBox="0 0 160 24" role="img" aria-hidden="true">
          <text x="0" y="18" font-family="Inter, sans-serif" font-size="17" font-weight="400" letter-spacing="3" fill="currentColor">CADENCE</text>
        </svg>
      </div>

      <div class="logo logo--tall" role="listitem" aria-label="Meridian Review">
        <svg viewBox="0 0 180 24" role="img" aria-hidden="true">
          <circle cx="10" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/>
          <line x1="10" y1="3" x2="10" y2="21" stroke="currentColor" stroke-width="2"/>
          <text x="30" y="18" font-family="Fraunces, Georgia, serif" font-size="19" font-style="italic" fill="currentColor">Meridian</text>
        </svg>
      </div>

      <div class="logo logo--wide" role="listitem" aria-label="Signal &amp; Strategy Journal">
        <svg viewBox="0 0 240 24" role="img" aria-hidden="true">
          <text x="0" y="18" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="currentColor">Signal</text>
          <text x="70" y="18" font-family="Inter, sans-serif" font-size="18" font-weight="400" fill="currentColor">&amp; Strategy</text>
        </svg>
      </div>

      <div class="logo" role="listitem" aria-label="Provan Daily">
        <svg viewBox="0 0 160 24" role="img" aria-hidden="true">
          <text x="0" y="18" font-family="Fraunces, Georgia, serif" font-size="20" font-weight="500" letter-spacing="1" fill="currentColor">PROVAN</text>
        </svg>
      </div>

    </div>

    <div class="press__meta">
      <span>Selected coverage, <strong>2023—2026</strong></span>
      <span class="bar"></span>
      <span><strong>41</strong> features &amp; mentions</span>
    </div>

  </div>
</section>
</body>
</html>
