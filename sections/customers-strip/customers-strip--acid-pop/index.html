<!DOCTYPE html>
<!-- ===== customers-strip — ACID-POP ===== -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customers Strip — Acid Pop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{overflow-x:hidden;}

:root{
  --ink:#0A0A0A;
  --ink-soft:#161616;
  --paper:#F4F4F0;
  --lime:#C7F13B;
  --magenta:#FF4D9D;
  --white:#FFFFFF;
  --line:#2A2A2A;
  --font:'Archivo',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}

body{
  background:var(--ink);
  color:var(--white);
  font-family:var(--font);
  -webkit-font-smoothing:antialiased;
}

.cs-section{
  width:100%;
  max-width:1440px;
  margin:0 auto;
  padding:96px 64px 104px;
  background:var(--ink);
  position:relative;
  overflow:hidden;
}

/* decorative offset slab, keeps it asymmetric */
.cs-section::before{
  content:"";
  position:absolute;
  top:-60px;
  right:-80px;
  width:340px;
  height:340px;
  background:var(--magenta);
  transform:rotate(18deg);
  opacity:.10;
  border-radius:40px;
  pointer-events:none;
}

.cs-inner{
  position:relative;
  z-index:2;
  display:grid;
  grid-template-columns:minmax(0,1.15fr) minmax(0,0.85fr);
  gap:56px;
  align-items:center;
}

/* ---- left: eyebrow + heading + avatars ---- */
.cs-eyebrow{
  display:inline-block;
  background:var(--lime);
  color:var(--ink);
  font-weight:800;
  font-size:13px;
  letter-spacing:.12em;
  text-transform:uppercase;
  padding:8px 16px;
  border-radius:100px;
  margin-bottom:28px;
}

.cs-head{
  font-weight:900;
  font-size:clamp(44px,5.6vw,88px);
  line-height:.92;
  letter-spacing:-0.03em;
  text-transform:uppercase;
  margin-bottom:38px;
}
.cs-head em{
  font-style:normal;
  color:var(--lime);
}
.cs-head .mag{
  color:var(--magenta);
}

/* avatar row */
.cs-avatars{
  display:flex;
  align-items:center;
  margin-bottom:22px;
}
.cs-av{
  width:66px;
  height:66px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  font-size:24px;
  color:var(--ink);
  border:3px solid var(--ink);
  margin-left:-20px;
  flex:0 0 auto;
  box-shadow:0 0 0 1px rgba(255,255,255,.06);
}
.cs-av:first-child{margin-left:0;}
.cs-av.a1{background:var(--lime);}
.cs-av.a2{background:var(--magenta);color:var(--white);}
.cs-av.a3{background:#FFFFFF;}
.cs-av.a4{background:var(--lime);}
.cs-av.a5{background:var(--magenta);color:var(--white);}
.cs-av.more{
  background:var(--ink-soft);
  color:var(--lime);
  font-size:16px;
  letter-spacing:-0.02em;
  border:3px solid var(--line);
}

.cs-join{
  font-weight:700;
  font-size:18px;
  color:#C9C9C9;
  max-width:440px;
  line-height:1.4;
}
.cs-join b{
  color:var(--white);
  font-weight:900;
}

/* ---- right: rating card ---- */
.cs-rate{
  background:var(--ink-soft);
  border:2px solid var(--line);
  border-radius:26px;
  padding:36px 34px;
  position:relative;
}
.cs-rate::after{
  content:"";
  position:absolute;
  left:34px;
  bottom:-2px;
  width:120px;
  height:6px;
  background:var(--lime);
  border-radius:100px;
}
.cs-stars{
  display:flex;
  gap:6px;
  margin-bottom:18px;
}
.cs-star{
  width:32px;
  height:32px;
  color:var(--lime);
}
.cs-score{
  font-weight:900;
  font-size:clamp(40px,4vw,58px);
  line-height:1;
  letter-spacing:-0.03em;
  margin-bottom:8px;
}
.cs-score span{
  font-size:24px;
  color:#6E6E6E;
}
.cs-rate-sub{
  font-weight:600;
  font-size:15px;
  color:#9A9A9A;
  margin-bottom:22px;
}
.cs-rate-sub b{color:var(--magenta);font-weight:800;}

.cs-src{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:700;
  font-size:13px;
  letter-spacing:.04em;
  text-transform:uppercase;
  color:#7C7C7C;
  border-top:1px solid var(--line);
  padding-top:18px;
}
.cs-src-dot{
  width:9px;height:9px;border-radius:50%;
  background:var(--magenta);
  flex:0 0 auto;
}

@media(max-width:640px){
  .cs-section{
    padding:56px 22px 64px;
  }
  .cs-section::before{
    width:200px;height:200px;top:-40px;right:-60px;
  }
  .cs-inner{
    grid-template-columns:1fr;
    gap:40px;
  }
  .cs-av{
    width:52px;height:52px;font-size:19px;margin-left:-16px;
  }
  .cs-join{font-size:16px;}
  .cs-star{width:26px;height:26px;}
}
</style>
</head>
<body>
<section class="cs-section" aria-label="Customers">
  <div class="cs-inner">

    <div class="cs-left">
      <span class="cs-eyebrow">Loved by builders</span>
      <h2 class="cs-head">Shipping teams<br><em>run on</em> <span class="mag">Relaydeck.</span></h2>

      <div class="cs-avatars" aria-hidden="true">
        <div class="cs-av a1">NK</div>
        <div class="cs-av a2">TP</div>
        <div class="cs-av a3">JR</div>
        <div class="cs-av a4">MC</div>
        <div class="cs-av a5">SA</div>
        <div class="cs-av more">+8k</div>
      </div>

      <p class="cs-join">Join <b>8,412 product teams</b> — from two-person startups to Series C rocketships — moving faster this quarter.</p>
    </div>

    <aside class="cs-rate">
      <div class="cs-stars" aria-hidden="true">
        <svg class="cs-star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.26L22 9.27l-5 4.87L18.2 22 12 18.5 5.8 22 7 14.14l-5-4.87 7.1-1.01z"/></svg>
        <svg class="cs-star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.26L22 9.27l-5 4.87L18.2 22 12 18.5 5.8 22 7 14.14l-5-4.87 7.1-1.01z"/></svg>
        <svg class="cs-star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.26L22 9.27l-5 4.87L18.2 22 12 18.5 5.8 22 7 14.14l-5-4.87 7.1-1.01z"/></svg>
        <svg class="cs-star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.26L22 9.27l-5 4.87L18.2 22 12 18.5 5.8 22 7 14.14l-5-4.87 7.1-1.01z"/></svg>
        <svg class="cs-star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.26L22 9.27l-5 4.87L18.2 22 12 18.5 5.8 22 7 14.14l-5-4.87 7.1-1.01z"/></svg>
      </div>
      <div class="cs-score">4.9<span>/5</span></div>
      <p class="cs-rate-sub">Averaged across <b>2,190 verified reviews</b></p>
      <div class="cs-src">
        <span class="cs-src-dot"></span>
        G2 · Winter Leader 2026
      </div>
    </aside>

  </div>
</section>
</body>
</html>
