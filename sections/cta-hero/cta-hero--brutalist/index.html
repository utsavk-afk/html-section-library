<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTA Hero — Brutalist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ===== CTA-HERO — BRUTALIST ===== */
*{box-sizing:border-box;margin:0;padding:0;}
html,body{overflow-x:hidden;}

:root{
  --paper:#FAFAF7;
  --ink:#111111;
  --acid:#FFE500;
  --red:#FF3B21;
  --white:#FFFFFF;
  --border:3px solid var(--ink);
  --shadow:6px 6px 0 var(--ink);
  --shadow-red:6px 6px 0 var(--red);
  --sans:'Archivo',sans-serif;
  --mono:'Space Mono',monospace;
}

.ctahero{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--sans);
  width:100%;
  min-height:640px;
  display:flex;
  align-items:stretch;
  padding:40px 20px;
  /* faint grid backdrop */
  background-image:
    linear-gradient(to right, rgba(17,17,17,.05) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(17,17,17,.05) 1px, transparent 1px);
  background-size:48px 48px;
}

.ctahero__frame{
  width:100%;
  max-width:1440px;
  margin:0 auto;
  border:var(--border);
  background:var(--white);
  box-shadow:var(--shadow);
  position:relative;
  padding:56px 64px 64px;
  overflow:hidden;
}

/* top strip / meta bar */
.ctahero__bar{
  position:absolute;
  top:0;left:0;right:0;
  height:34px;
  background:var(--ink);
  color:var(--acid);
  font-family:var(--mono);
  font-size:12px;
  font-weight:700;
  letter-spacing:.18em;
  text-transform:uppercase;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
}
.ctahero__bar span:last-child{color:var(--white);}

.ctahero__inner{
  margin-top:34px;
  display:grid;
  grid-template-columns:minmax(0,1fr) 300px;
  gap:48px;
  align-items:end;
}

.ctahero__tag{
  display:inline-block;
  font-family:var(--mono);
  font-size:13px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.14em;
  background:var(--acid);
  border:var(--border);
  padding:7px 14px;
  margin-bottom:26px;
  box-shadow:3px 3px 0 var(--ink);
}

.ctahero__h1{
  font-weight:900;
  text-transform:uppercase;
  line-height:.92;
  letter-spacing:-.02em;
  font-size:clamp(52px,9vw,132px);
}
.ctahero__h1 mark{
  background:var(--red);
  color:var(--white);
  padding:0 .06em;
}
.ctahero__h1 .u{
  display:inline-block;
  border-bottom:8px solid var(--acid);
}

.ctahero__actions{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:22px;
  margin-top:38px;
}

.ctahero__btn{
  font-family:var(--sans);
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.03em;
  font-size:20px;
  color:var(--ink);
  background:var(--acid);
  border:var(--border);
  box-shadow:var(--shadow);
  padding:20px 40px;
  cursor:pointer;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  gap:14px;
  transition:transform .08s ease, box-shadow .08s ease, background .08s ease;
}
.ctahero__btn svg{display:block;}
.ctahero__btn:hover{
  transform:translate(3px,3px);
  box-shadow:3px 3px 0 var(--ink);
  background:var(--red);
  color:var(--white);
}
.ctahero__btn:hover svg path{stroke:var(--white);}
.ctahero__btn:active{
  transform:translate(6px,6px);
  box-shadow:0 0 0 var(--ink);
}

.ctahero__sub{
  font-family:var(--mono);
  font-size:14px;
  font-weight:400;
  line-height:1.5;
  max-width:340px;
}
.ctahero__sub b{font-weight:700;}
.ctahero__sub .dot{color:var(--red);font-weight:700;}

/* right rail — asymmetric stat block */
.ctahero__rail{
  border-left:var(--border);
  padding-left:32px;
  align-self:stretch;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  gap:20px;
}
.ctahero__stat{
  border:var(--border);
  background:var(--paper);
  padding:16px 18px;
}
.ctahero__stat:nth-child(2){
  background:var(--ink);
  color:var(--white);
  box-shadow:var(--shadow-red);
}
.ctahero__stat .num{
  font-weight:900;
  font-size:40px;
  line-height:1;
  letter-spacing:-.03em;
}
.ctahero__stat:nth-child(2) .num{color:var(--acid);}
.ctahero__stat .lbl{
  font-family:var(--mono);
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.12em;
  margin-top:8px;
}

/* decorative corner tab */
.ctahero__tab{
  position:absolute;
  bottom:0;right:0;
  background:var(--red);
  color:var(--white);
  font-family:var(--mono);
  font-weight:700;
  font-size:12px;
  letter-spacing:.16em;
  text-transform:uppercase;
  padding:10px 18px;
  border-top:var(--border);
  border-left:var(--border);
}

@media(max-width:640px){
  .ctahero{padding:20px 12px;}
  .ctahero__frame{padding:44px 22px 56px;}
  .ctahero__bar{font-size:10px;letter-spacing:.1em;padding:0 10px;}
  .ctahero__inner{
    grid-template-columns:1fr;
    gap:32px;
    align-items:start;
  }
  .ctahero__h1{font-size:clamp(44px,14vw,72px);}
  .ctahero__actions{gap:16px;margin-top:28px;}
  .ctahero__btn{width:100%;justify-content:center;font-size:18px;padding:18px 24px;}
  .ctahero__sub{max-width:none;}
  .ctahero__rail{
    border-left:none;
    border-top:var(--border);
    padding-left:0;
    padding-top:26px;
    flex-direction:row;
    flex-wrap:wrap;
  }
  .ctahero__stat{flex:1 1 40%;}
}
</style>
</head>
<body>

<section class="ctahero">
  <div class="ctahero__frame">
    <div class="ctahero__bar">
      <span>◤ SHIP-KIT / v4.2</span>
      <span>NO COOKIES · NO WAIT · 4,812 BUILDS TODAY</span>
    </div>

    <div class="ctahero__inner">
      <div class="ctahero__lead">
        <span class="ctahero__tag">★ Free forever tier</span>
        <h1 class="ctahero__h1">
          Stop<br>
          <mark>Tweaking</mark><br>
          <span class="u">Start Shipping.</span>
        </h1>

        <div class="ctahero__actions">
          <a class="ctahero__btn" href="#start">
            Deploy in 90 sec
            <svg width="26" height="20" viewBox="0 0 26 20" fill="none" aria-hidden="true">
              <path d="M2 10H23M23 10L15 2M23 10L15 18" stroke="#111111" stroke-width="3" stroke-linecap="square"/>
            </svg>
          </a>
          <p class="ctahero__sub">
            <b>No credit card.</b> Clone the repo, push once, and your section goes live<span class="dot"> —</span> we handle the boring build step.
          </p>
        </div>
      </div>

      <aside class="ctahero__rail">
        <div class="ctahero__stat">
          <div class="num">0ms</div>
          <div class="lbl">Build config</div>
        </div>
        <div class="ctahero__stat">
          <div class="num">120+</div>
          <div class="lbl">Copy-paste blocks</div>
        </div>
      </aside>
    </div>

    <div class="ctahero__tab">Copy · Paste · Ship</div>
  </div>
</section>

</body>
</html>
