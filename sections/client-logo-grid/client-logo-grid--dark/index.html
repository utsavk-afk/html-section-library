<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Logo Grid — Dark / Luxe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet">
<style>
/* ===== CLIENT-LOGO-GRID — DARK/LUXE ===== */
*{box-sizing:border-box;margin:0;padding:0;}
html,body{overflow-x:hidden;}

:root{
  --bg:#121216;
  --panel:#17171c;
  --ink:#F4F4F5;
  --muted:#A1A1AA;
  --faint:#6b6b74;
  --line:#2a2a31;
  --line-soft:#212127;
  --amber:#F59E42;
  --sans:'Inter',system-ui,-apple-system,sans-serif;
  --serif:'Fraunces',Georgia,serif;
}

body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--sans);
  -webkit-font-smoothing:antialiased;
}

.lg-section{
  width:100%;
  max-width:1440px;
  margin:0 auto;
  padding:96px 64px 104px;
  position:relative;
}

/* header row — asymmetric, left-weighted */
.lg-head{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:48px;
  padding-bottom:40px;
  margin-bottom:0;
  border-bottom:1px solid var(--line);
}
.lg-head-left{max-width:560px;}
.lg-eyebrow{
  display:inline-flex;
  align-items:center;
  gap:10px;
  font-size:12px;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:22px;
}
.lg-eyebrow::before{
  content:"";
  width:24px;
  height:1px;
  background:var(--amber);
}
.lg-title{
  font-family:var(--serif);
  font-weight:400;
  font-size:clamp(28px,3.4vw,46px);
  line-height:1.08;
  letter-spacing:-.01em;
  color:var(--ink);
}
.lg-title em{
  font-style:italic;
  color:var(--amber);
}
.lg-note{
  text-align:right;
  color:var(--muted);
  font-size:14px;
  line-height:1.6;
  max-width:250px;
  padding-bottom:4px;
}
.lg-note b{
  display:block;
  color:var(--ink);
  font-weight:600;
  font-size:34px;
  font-family:var(--serif);
  letter-spacing:-.02em;
  line-height:1;
  margin-bottom:8px;
}

/* the grid — ruled, no glow, even muted cells */
.lg-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  border-left:1px solid var(--line-soft);
  border-top:1px solid var(--line-soft);
}
.lg-cell{
  position:relative;
  border-right:1px solid var(--line-soft);
  border-bottom:1px solid var(--line-soft);
  min-height:150px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:28px 22px;
  transition:background .35s ease;
}
.lg-cell:hover{background:var(--panel);}
.lg-cell:hover svg{opacity:1;}
.lg-cell svg{
  opacity:.62;
  color:var(--muted);
  transition:opacity .35s ease,color .35s ease;
  max-width:100%;
  height:auto;
}
.lg-cell:hover svg{color:var(--ink);}
/* single amber focal point — one featured client */
.lg-cell--feature svg{color:var(--amber);opacity:.9;}
.lg-cell--feature:hover svg{color:var(--amber);opacity:1;}
.lg-tag{
  position:absolute;
  top:14px;
  left:16px;
  font-size:10px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--faint);
}
.lg-cell--feature .lg-tag{color:var(--amber);}

.lg-foot{
  margin-top:32px;
  display:flex;
  align-items:center;
  gap:14px;
  color:var(--faint);
  font-size:13px;
}
.lg-foot .dot{width:5px;height:5px;border-radius:50%;background:var(--amber);flex:none;}

@media(max-width:900px){
  .lg-grid{grid-template-columns:repeat(2,1fr);}
  .lg-section{padding:72px 40px 80px;}
}
@media(max-width:640px){
  .lg-section{padding:56px 20px 64px;}
  .lg-head{
    flex-direction:column;
    align-items:flex-start;
    gap:24px;
  }
  .lg-note{text-align:left;}
  .lg-note b{font-size:28px;}
  .lg-grid{grid-template-columns:repeat(2,1fr);}
  .lg-cell{min-height:120px;padding:20px 14px;}
}
</style>
</head>
<body>
<section class="lg-section" aria-label="Selected clients">
  <div class="lg-head">
    <div class="lg-head-left">
      <span class="lg-eyebrow">Selected engagements</span>
      <h2 class="lg-title">Operators we build with, <em>quarter after quarter.</em></h2>
    </div>
    <div class="lg-note">
      <b>34</b>
      teams shipped to production since 2021 — a handful named below.
    </div>
  </div>

  <div class="lg-grid">

    <!-- Row 1 -->
    <div class="lg-cell">
      <span class="lg-tag">Fintech</span>
      <svg width="150" height="26" viewBox="0 0 150 26" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Halden Reserve">
        <rect x="0" y="4" width="18" height="18" rx="4" stroke="currentColor" stroke-width="1.6"/>
        <path d="M5 13h8M9 8v10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <text x="28" y="18" font-family="Fraunces, serif" font-size="17" letter-spacing="0.5" fill="currentColor">Halden Reserve</text>
      </svg>
    </div>

    <div class="lg-cell lg-cell--feature">
      <span class="lg-tag">Anchor client</span>
      <svg width="146" height="28" viewBox="0 0 146 28" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Northwind Labs">
        <path d="M4 22V6l12 12V6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="30" y="19" font-family="Inter, sans-serif" font-weight="600" font-size="16" letter-spacing="0.2" fill="currentColor">Northwind</text>
        <text x="30" y="19" font-family="Inter, sans-serif" font-weight="600" font-size="16" fill="currentColor" opacity="0"></text>
        <circle cx="140" cy="7" r="2.4" fill="currentColor"/>
      </svg>
    </div>

    <div class="lg-cell">
      <span class="lg-tag">Logistics</span>
      <svg width="138" height="24" viewBox="0 0 138 24" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cargofield">
        <path d="M2 18l7-12 7 12M5.5 13h7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="24" y="17" font-family="Inter, sans-serif" font-weight="500" font-size="16" letter-spacing="-0.2" fill="currentColor">Cargofield</text>
      </svg>
    </div>

    <div class="lg-cell">
      <span class="lg-tag">Health</span>
      <svg width="140" height="24" viewBox="0 0 140 24" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Verava Health">
        <path d="M3 12c3-6 7-6 9 0s6 6 9 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <text x="28" y="17" font-family="Fraunces, serif" font-size="16" fill="currentColor">Verava</text>
      </svg>
    </div>

    <!-- Row 2 -->
    <div class="lg-cell">
      <span class="lg-tag">Media</span>
      <svg width="150" height="24" viewBox="0 0 150 24" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ostby Press">
        <rect x="2" y="4" width="16" height="16" rx="8" stroke="currentColor" stroke-width="1.6"/>
        <path d="M10 4v16" stroke="currentColor" stroke-width="1.6"/>
        <text x="28" y="17" font-family="Inter, sans-serif" font-weight="600" font-size="15" letter-spacing="0.4" fill="currentColor">ØSTBY PRESS</text>
      </svg>
    </div>

    <div class="lg-cell">
      <span class="lg-tag">Energy</span>
      <svg width="136" height="24" viewBox="0 0 136 24" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kilowatt Nine">
        <path d="M11 2L4 14h6l-2 8 9-13h-6l1-7z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <text x="24" y="17" font-family="Inter, sans-serif" font-weight="500" font-size="15" fill="currentColor">Kilowatt 9</text>
      </svg>
    </div>

    <div class="lg-cell">
      <span class="lg-tag">Retail</span>
      <svg width="144" height="24" viewBox="0 0 144 24" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Marlowe & Co">
        <path d="M4 20V6l5 8 5-8v14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="26" y="17" font-family="Fraunces, serif" font-style="italic" font-size="16" fill="currentColor">Marlowe &amp; Co</text>
      </svg>
    </div>

    <div class="lg-cell">
      <span class="lg-tag">Infra</span>
      <svg width="140" height="24" viewBox="0 0 140 24" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Basalt Systems">
        <path d="M9 3l7 4v8l-7 4-7-4V7l7-4z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <text x="24" y="17" font-family="Inter, sans-serif" font-weight="600" font-size="15" letter-spacing="-0.2" fill="currentColor">Basalt</text>
      </svg>
    </div>

  </div>

  <div class="lg-foot">
    <span class="dot"></span>
    Names shown with permission. Full reference list available under NDA on request.
  </div>
</section>
</body>
</html>
