<!DOCTYPE html>
<!-- ===== CTA — ACID-POP ===== -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTA — Acid Pop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Archivo+Expanded:wght@800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#0A0A0A;
  --ink:#F4F4EF;
  --muted:#8A8A82;
  --line:#1F1F1D;
  --accent:#C7F13B;      /* lime primary */
  --accent-2:#FF4D9D;    /* magenta secondary */
  --serif:'Archivo Expanded','Archivo',sans-serif;
  --sans:'Archivo',system-ui,sans-serif;
  --mono:'Space Mono',ui-monospace,monospace;
}

.acidcta{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--sans);
  padding:120px 48px;
  position:relative;
  overflow:hidden;
  min-height:640px;
  display:flex;
  align-items:center;
}

/* oversized flat background wordmark, no glow */
.acidcta__ghost{
  position:absolute;
  right:-4%;
  bottom:-14%;
  font-family:var(--serif);
  font-weight:900;
  font-size:clamp(220px,34vw,540px);
  line-height:.8;
  letter-spacing:-.04em;
  color:transparent;
  -webkit-text-stroke:2px var(--line);
  text-stroke:2px var(--line);
  pointer-events:none;
  user-select:none;
  z-index:0;
}

/* flat lime slab off to one side — the single focal anchor */
.acidcta__slab{
  position:absolute;
  top:0;
  left:0;
  width:14px;
  height:100%;
  background:var(--accent);
  z-index:1;
}

.acidcta__inner{
  position:relative;
  z-index:2;
  width:100%;
  max-width:1180px;
  margin:0 auto;
  display:grid;
  grid-template-columns:1.55fr .95fr;
  gap:56px;
  align-items:center;
}

.acidcta__eyebrow{
  display:inline-flex;
  align-items:center;
  gap:10px;
  font-family:var(--mono);
  font-size:13px;
  font-weight:700;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:26px;
}
.acidcta__eyebrow span{
  width:26px;height:2px;background:var(--accent-2);display:inline-block;
}

.acidcta__head{
  font-family:var(--serif);
  font-weight:900;
  font-size:clamp(52px,7.4vw,116px);
  line-height:.86;
  letter-spacing:-.03em;
  text-transform:uppercase;
  text-wrap:balance;
}
.acidcta__head em{
  font-style:normal;
  color:var(--bg);
  background:var(--accent);
  padding:0 .14em;
  box-decoration-break:clone;
  -webkit-box-decoration-break:clone;
}
.acidcta__head b{
  font-weight:900;
  color:var(--accent-2);
}

.acidcta__aside{
  border-left:2px solid var(--line);
  padding-left:28px;
}
.acidcta__lead{
  font-size:18px;
  line-height:1.5;
  font-weight:600;
  color:var(--ink);
  max-width:34ch;
  margin-bottom:32px;
}

/* chunky pill button, flat fill */
.acidcta__btn{
  display:inline-flex;
  align-items:center;
  gap:14px;
  background:var(--accent);
  color:#0A0A0A;
  font-family:var(--sans);
  font-weight:800;
  font-size:19px;
  letter-spacing:-.01em;
  text-decoration:none;
  padding:20px 34px;
  border-radius:999px;
  border:3px solid var(--accent);
  transition:transform .12s ease, background .12s ease, border-color .12s ease, color .12s ease;
}
.acidcta__btn svg{transition:transform .18s ease;}
.acidcta__btn:hover{
  background:var(--accent-2);
  border-color:var(--accent-2);
  color:#0A0A0A;
  transform:translate(-3px,-3px);
}
.acidcta__btn:hover svg{transform:translateX(5px);}
.acidcta__btn:focus-visible{
  outline:3px solid var(--ink);
  outline-offset:4px;
}

.acidcta__reassure{
  margin-top:20px;
  display:flex;
  align-items:center;
  gap:10px;
  font-family:var(--mono);
  font-size:13px;
  font-weight:400;
  color:var(--muted);
  letter-spacing:.01em;
}
.acidcta__dot{
  width:8px;height:8px;border-radius:50%;background:var(--accent);
  flex:none;
}

@media (max-width:640px){
  .acidcta{padding:72px 24px;min-height:auto;}
  .acidcta__inner{grid-template-columns:1fr;gap:36px;}
  .acidcta__ghost{font-size:200px;right:-8%;bottom:-6%;}
  .acidcta__aside{border-left:none;border-top:2px solid var(--line);padding-left:0;padding-top:28px;}
  .acidcta__btn{width:100%;justify-content:center;}
}

@media (prefers-reduced-motion:reduce){
  .acidcta__btn,.acidcta__btn svg{transition:none;}
}
</style>
</head>
<body>
<section class="acidcta" aria-labelledby="acidcta-head">
  <div class="acidcta__slab" aria-hidden="true"></div>
  <div class="acidcta__ghost" aria-hidden="true">GO</div>

  <div class="acidcta__inner">
    <div class="acidcta__main">
      <p class="acidcta__eyebrow"><span></span>Copy · Paste · Ship</p>
      <h2 class="acidcta__head" id="acidcta-head">
        Stop rebuilding<br>the same <em>section</em><br>for the <b>tenth</b> time
      </h2>
    </div>

    <div class="acidcta__aside">
      <p class="acidcta__lead">
        200+ production-ready blocks. Drop one into Claude Code, tweak the tokens, walk away. No frameworks, no build step, no npm install of doom.
      </p>
      <a class="acidcta__btn" href="#grab">
        Grab the library
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 12h15M13 6l6 6-6 6" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
      <p class="acidcta__reassure">
        <span class="acidcta__dot" aria-hidden="true"></span>
        Free forever. MIT-licensed. No signup, no email wall.
      </p>
    </div>
  </div>
</section>
</body>
</html>
