<!DOCTYPE html>
<!-- ===== CLIENT-LOGOS — BRUTALIST ===== -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Logos — Brutalist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#FAFAF7;
  --ink:#111111;
  --muted:#6E6E68;
  --line:#111111;
  --accent:#FFE500;
  --secondary:#FF3B21;
  --serif:"Archivo",sans-serif;
  --sans:"Archivo",sans-serif;
  --mono:"Space Mono",monospace;
}

body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--sans);
  -webkit-font-smoothing:antialiased;
}

.logos{
  width:100%;
  min-height:640px;
  display:flex;
  align-items:center;
  padding:80px 48px;
  background:
    linear-gradient(90deg,var(--line) 1px,transparent 1px) 0 0/48px 100%,
    var(--bg);
  position:relative;
  overflow:hidden;
}
.logos::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(0deg,var(--line) 1px,transparent 1px) 0 0/100% 48px;
  opacity:.06;
  pointer-events:none;
}

.logos__inner{
  width:100%;
  max-width:1440px;
  margin:0 auto;
  position:relative;
  z-index:1;
}

/* ---- header row: asymmetric, one focal point ---- */
.logos__head{
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:flex-end;
  gap:32px;
  margin-bottom:44px;
}

.logos__label{
  font-family:var(--mono);
  font-size:12px;
  font-weight:700;
  letter-spacing:.34em;
  text-transform:uppercase;
  color:var(--ink);
  background:var(--accent);
  border:3px solid var(--line);
  box-shadow:6px 6px 0 var(--line);
  padding:9px 14px 8px;
  display:inline-block;
  white-space:nowrap;
}

.logos__note{
  font-family:var(--mono);
  font-size:12px;
  line-height:1.5;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.06em;
  padding-bottom:2px;
  max-width:320px;
}
.logos__note b{color:var(--ink);}

.logos__count{
  font-family:var(--sans);
  font-weight:900;
  font-size:15px;
  letter-spacing:-.01em;
  text-transform:uppercase;
  color:var(--ink);
  border-bottom:4px solid var(--secondary);
  padding-bottom:3px;
  white-space:nowrap;
  align-self:flex-end;
}

/* ---- logo strip ---- */
.logos__strip{
  border:3px solid var(--line);
  box-shadow:8px 8px 0 var(--line);
  background:var(--bg);
  display:grid;
  grid-template-columns:repeat(6,1fr);
}

.logos__cell{
  border-right:3px solid var(--line);
  min-height:132px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px 18px;
  position:relative;
  transition:background .12s ease;
}
.logos__cell:last-child{border-right:none;}
.logos__cell:hover{background:var(--accent);}

/* muted wordmarks */
.logos__cell svg{
  width:100%;
  height:auto;
  max-height:40px;
  color:var(--muted);
  transition:color .12s ease;
}
.logos__cell:hover svg{color:var(--ink);}

/* tiny corner index tag */
.logos__cell::after{
  content:attr(data-idx);
  position:absolute;
  top:8px;
  left:9px;
  font-family:var(--mono);
  font-size:9px;
  font-weight:700;
  color:var(--muted);
  opacity:.55;
}

/* ---- footer meta ---- */
.logos__foot{
  margin-top:24px;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:14px 22px;
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--muted);
}
.logos__tick{
  display:inline-flex;
  align-items:center;
  gap:8px;
}
.logos__dot{
  width:9px;height:9px;
  background:var(--secondary);
  display:inline-block;
}
.logos__dot--y{background:var(--accent);border:2px solid var(--line);}

@media(max-width:640px){
  .logos{padding:52px 20px;min-height:0;background-size:24px 100%;}
  .logos__inner{max-width:100%;}
  .logos__head{
    grid-template-columns:1fr;
    align-items:flex-start;
    gap:18px;
    margin-bottom:28px;
  }
  .logos__count{align-self:flex-start;}
  .logos__strip{
    grid-template-columns:repeat(2,1fr);
    box-shadow:6px 6px 0 var(--line);
  }
  .logos__cell{
    min-height:104px;
    border-bottom:3px solid var(--line);
    padding:20px 14px;
  }
  .logos__cell:nth-child(2n){border-right:none;}
  .logos__cell:nth-child(5),
  .logos__cell:nth-child(6){border-bottom:none;}
  .logos__cell svg{max-height:34px;}
}
</style>
</head>
<body>

<section class="logos" aria-label="Trusted by">
  <div class="logos__inner">

    <div class="logos__head">
      <span class="logos__label">Trusted / Shipped With</span>
      <p class="logos__note">Teams that dropped these blocks straight into <b>Claude Code</b> — no build step, no npm.</p>
      <span class="logos__count">06 / Live in Prod</span>
    </div>

    <div class="logos__strip">

      <div class="logos__cell" data-idx="01">
        <!-- NORTHBOUND -->
        <svg viewBox="0 0 200 40" role="img" aria-label="Northbound Labs">
          <path d="M6 34 V6 h6 l14 20 V6 h6 v28 h-6 L12 14 v20 z" fill="currentColor"/>
          <text x="52" y="26" font-family="Archivo, sans-serif" font-weight="800" font-size="18" letter-spacing="1" fill="currentColor">NORTHBOUND</text>
        </svg>
      </div>

      <div class="logos__cell" data-idx="02">
        <!-- HELIX FREIGHT -->
        <svg viewBox="0 0 200 40" role="img" aria-label="Helix Freight">
          <rect x="6" y="8" width="24" height="24" fill="none" stroke="currentColor" stroke-width="4"/>
          <path d="M12 26 L24 14 M12 14 L24 26" stroke="currentColor" stroke-width="4"/>
          <text x="42" y="20" font-family="Archivo, sans-serif" font-weight="900" font-size="15" letter-spacing=".5" fill="currentColor">HELIX</text>
          <text x="42" y="34" font-family="'Space Mono', monospace" font-weight="700" font-size="9" letter-spacing="3" fill="currentColor">FREIGHT</text>
        </svg>
      </div>

      <div class="logos__cell" data-idx="03">
        <!-- MODEBLK -->
        <svg viewBox="0 0 200 40" role="img" aria-label="Modeblk">
          <circle cx="17" cy="20" r="12" fill="none" stroke="currentColor" stroke-width="4"/>
          <rect x="17" y="8" width="12" height="24" fill="currentColor"/>
          <text x="42" y="27" font-family="Archivo, sans-serif" font-weight="700" font-size="19" letter-spacing="-.5" fill="currentColor">modeblk</text>
        </svg>
      </div>

      <div class="logos__cell" data-idx="04">
        <!-- QUARRY OS -->
        <svg viewBox="0 0 200 40" role="img" aria-label="Quarry OS">
          <text x="6" y="27" font-family="'Space Mono', monospace" font-weight="700" font-size="19" letter-spacing="1" fill="currentColor">QUARRY</text>
          <rect x="118" y="10" width="34" height="20" fill="none" stroke="currentColor" stroke-width="3"/>
          <text x="124" y="25" font-family="Archivo, sans-serif" font-weight="900" font-size="13" fill="currentColor">OS</text>
        </svg>
      </div>

      <div class="logos__cell" data-idx="05">
        <!-- FLATRATE.CO -->
        <svg viewBox="0 0 200 40" role="img" aria-label="Flatrate">
          <rect x="6" y="17" width="30" height="6" fill="currentColor"/>
          <text x="44" y="27" font-family="Archivo, sans-serif" font-weight="800" font-size="17" letter-spacing="-.5" fill="currentColor">FLATRATE</text>
          <text x="163" y="27" font-family="'Space Mono', monospace" font-weight="700" font-size="12" fill="currentColor">.co</text>
        </svg>
      </div>

      <div class="logos__cell" data-idx="06">
        <!-- DUSKWORKS -->
        <svg viewBox="0 0 200 40" role="img" aria-label="Duskworks Studio">
          <path d="M8 32 A14 14 0 0 1 8 8 A10 10 0 0 0 8 32 z" fill="currentColor"/>
          <text x="30" y="21" font-family="Archivo, sans-serif" font-weight="900" font-size="15" letter-spacing="0" fill="currentColor">DUSKWORKS</text>
          <text x="30" y="33" font-family="'Space Mono', monospace" font-weight="400" font-size="8.5" letter-spacing="3.5" fill="currentColor">STUDIO — EST 21</text>
        </svg>
      </div>

    </div>

    <div class="logos__foot">
      <span class="logos__tick"><span class="logos__dot logos__dot--y"></span>Copy · Paste · Ship</span>
      <span class="logos__tick"><span class="logos__dot"></span>Zero Dependencies</span>
      <span class="logos__tick"><span class="logos__dot"></span>Names Invented / Not Real Clients</span>
    </div>

  </div>
</section>

</body>
</html>
