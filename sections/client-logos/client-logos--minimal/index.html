<!DOCTYPE html>
<!-- ===== CLIENT-LOGOS — MINIMAL ===== -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Logos — Minimal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#ffffff;
  --ink:#141414;
  --muted:#737373;
  --line:#e7e7e4;
  --accent:#c0492b;
  --serif:"Inter",sans-serif;
  --sans:"Inter",-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--sans);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}

.logos{
  width:100%;
  padding:120px clamp(24px,7vw,140px);
  display:flex;
  align-items:center;
  justify-content:center;
}

.logos__inner{
  width:100%;
  max-width:1160px;
}

/* asymmetric header row: label pinned left, count note far right */
.logos__head{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:24px;
  padding-bottom:10px;
  margin-bottom:52px;
  border-bottom:1px solid var(--line);
}

.logos__label{
  font-size:12px;
  font-weight:600;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--muted);
  display:inline-flex;
  align-items:center;
  gap:12px;
}
.logos__label::before{
  content:"";
  width:22px;
  height:1px;
  background:var(--accent);
  display:inline-block;
}

.logos__note{
  font-size:13px;
  color:var(--muted);
  letter-spacing:.01em;
}
.logos__note b{
  color:var(--ink);
  font-weight:600;
}

/* logo grid — uneven column widths so it doesn't read as a uniform card grid */
.logos__row{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  align-items:center;
  gap:0;
}

.mark{
  display:flex;
  align-items:center;
  gap:9px;
  padding:22px 4px;
  color:var(--muted);
  transition:color .25s ease;
}
.mark:not(:last-child){
  border-right:1px solid var(--line);
  padding-right:26px;
}
.mark:not(:first-child){
  padding-left:26px;
}
.mark:hover{color:var(--ink);}

.mark svg{
  flex:none;
  display:block;
}
.mark__type{
  font-size:16px;
  font-weight:700;
  letter-spacing:-.02em;
  line-height:1;
  white-space:nowrap;
}
.mark__type span{font-weight:400;}
.mark__type em{
  font-style:normal;
  color:var(--accent);
}

/* footer line under the strip */
.logos__foot{
  margin-top:44px;
  font-size:13px;
  line-height:1.6;
  color:var(--muted);
  max-width:520px;
}
.logos__foot a{
  color:var(--ink);
  text-decoration:none;
  border-bottom:1px solid var(--ink);
  padding-bottom:1px;
}
.logos__foot a:hover{color:var(--accent);border-color:var(--accent);}

@media(max-width:640px){
  .logos{padding:72px 22px;}
  .logos__head{
    flex-direction:column;
    align-items:flex-start;
    gap:6px;
    margin-bottom:36px;
  }
  .logos__row{
    grid-template-columns:repeat(2,1fr);
    gap:0;
  }
  .mark{
    padding:20px 8px;
    justify-content:flex-start;
  }
  .mark:not(:last-child){border-right:none;padding-right:8px;}
  .mark:not(:first-child){padding-left:8px;}
  .mark:nth-child(odd){border-right:1px solid var(--line);}
  .mark:nth-child(-n+4){border-bottom:1px solid var(--line);}
  .logos__foot{margin-top:32px;}
}
</style>
</head>
<body>

  <section class="logos" aria-label="Companies that use our workflow">
    <div class="logos__inner">

      <div class="logos__head">
        <span class="logos__label">Trusted in production by</span>
        <span class="logos__note">Shipping across <b>1,400+</b> teams</span>
      </div>

      <div class="logos__row">

        <!-- Northbound — arrow-mark -->
        <div class="mark">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <path d="M4 14 L14 4 M14 4 H7 M14 4 V11" stroke="currentColor" stroke-width="1.6" stroke-linecap="square"/>
          </svg>
          <span class="mark__type">North<span>bound</span></span>
        </div>

        <!-- Halcyon — dot accent -->
        <div class="mark">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <circle cx="8" cy="8" r="6.2" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="8" cy="8" r="2" fill="currentColor"/>
          </svg>
          <span class="mark__type">Halcyon<em>.</em></span>
        </div>

        <!-- Ferrologic — bracket -->
        <div class="mark">
          <svg width="15" height="16" viewBox="0 0 15 16" fill="none" aria-hidden="true">
            <path d="M9 2 H13 V14 H9 M6 2 H2 V14 H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/>
          </svg>
          <span class="mark__type">Ferro<span>logic</span></span>
        </div>

        <!-- Meridian — split slash -->
        <div class="mark">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M2 14 L14 2" stroke="currentColor" stroke-width="1.6"/>
            <path d="M2 8 H7 M9 8 H14" stroke="currentColor" stroke-width="1.6"/>
          </svg>
          <span class="mark__type">Meridian</span>
        </div>

        <!-- Cadence — triple bar -->
        <div class="mark">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M3 12 V6 M8 12 V3 M13 12 V8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
          <span class="mark__type">Cadence</span>
        </div>

        <!-- Oakmont & Reed — ampersand lockup -->
        <div class="mark">
          <svg width="15" height="16" viewBox="0 0 15 16" fill="none" aria-hidden="true">
            <rect x="2" y="2" width="11" height="12" rx="1" stroke="currentColor" stroke-width="1.5"/>
            <path d="M5.5 11 V5 L9.5 11 M9.5 5 V11" stroke="currentColor" stroke-width="1.3"/>
          </svg>
          <span class="mark__type">Oakmont<span> &amp; Reed</span></span>
        </div>

      </div>

      <p class="logos__foot">
        From two-person studios to Series C platform teams — the same
        drop-in setup runs everywhere. <a href="#">See the case studies</a>.
      </p>

    </div>
  </section>

</body>
</html>
